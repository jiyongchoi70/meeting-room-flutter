name: meeting_room_flutter
description: BTA meeting room reservation app
publish_to: "none"

version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.6.0

  # Calendar
  table_calendar: ^3.1.2

  # State management (원하면 Riverpod 기준)
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^14.2.0

  # Model
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Env
  flutter_dotenv: ^5.1.0

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.2
  collection: ^1.18.0

  # UI
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

  # Codegen
  build_runner: ^2.4.11
  freezed: ^2.5.7
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/icons/
